<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ai-sports Web</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <header class="hero">
      <p class="kicker">AI SPORTS</p>
      <h1>足球数据前端控制台</h1>
      <p class="sub">管理球员身体数据、训练/比赛会话，以及 GPS 背心记录。</p>
    </header>

    <main class="layout">
      <section class="card">
        <h2>球员管理</h2>
        <form id="player-form" class="form-grid">
          <input name="name" placeholder="姓名" required />
          <input name="position" placeholder="位置 (FW/MF/DF/GK)" required />
          <input name="height_cm" type="number" step="0.1" placeholder="身高(cm)" required />
          <input name="weight_kg" type="number" step="0.1" placeholder="体重(kg)" required />
          <input name="body_fat_pct" type="number" step="0.1" placeholder="体脂(%)" />
          <input name="resting_hr" type="number" placeholder="静息心率(bpm)" />
          <button type="submit">新增球员</button>
        </form>
        <div id="players" class="list"></div>
      </section>

      <section class="card">
        <h2>训练/比赛会话</h2>
        <form id="session-form" class="form-grid">
          <input name="title" placeholder="会话标题" required />
          <select name="session_type" required>
            <option value="training">training</option>
            <option value="match">match</option>
          </select>
          <input name="session_date" type="date" required />
          <input name="location" placeholder="地点" />
          <input name="opponent" placeholder="对手（match可填）" />
          <button type="submit">新增会话</button>
        </form>
        <div id="sessions" class="list"></div>
      </section>

      <section class="card wide">
        <h2>GPS 记录</h2>
        <form id="gps-form" class="form-grid">
          <select name="player_id" id="gps-player" required></select>
          <select name="session_id" id="gps-session" required></select>
          <input name="distance_m" type="number" step="0.1" placeholder="距离(m)" required />
          <input name="max_speed_mps" type="number" step="0.1" placeholder="最大速度(m/s)" required />
          <input name="duration_min" type="number" step="0.1" placeholder="时长(min)" required />
          <input name="sprint_count" type="number" placeholder="冲刺次数" />
          <button type="submit">新增 GPS</button>
        </form>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>球员</th>
                <th>会话</th>
                <th>类型</th>
                <th>日期</th>
                <th>距离(m)</th>
                <th>最大速度(m/s)</th>
                <th>时长(min)</th>
              </tr>
            </thead>
            <tbody id="gps-table"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
